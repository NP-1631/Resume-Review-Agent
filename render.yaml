services:
  - type: web
    name: resume-review-agent
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: resume_review_agent
      - key: ALLOWED_ORIGINS
        sync: false
    - key: PYTHON_VERSION
            value: 3.11.9
    autoDeploy: true
